; PlatformIO Project Configuration File
; ESP32-S3 Custom Foxbody Taillight Controller

[env:esp32-s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Serial monitor
monitor_speed = 115200

; Libraries
lib_deps =
    fastled/FastLED @ ^3.7.0
    bblanchon/ArduinoJson @ ^7.0.0

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
